services:
  postgres-local:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=money-tracker-db'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5438:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  pg-data:
    driver: local
