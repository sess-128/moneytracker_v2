databaseChangeLog:
  - changeSet:
      id: 010526_01_00
      author: rrtyui
      validCheckSum: ANY
      changes:
        - createTable:
            tableName: categories
            schemaName: storage
            columns:
              - column:
                  name: id
                  type: java.util.UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: "uuid_generate_v4()"

              - column:
                  name: name
                  type: varchar(128)
                  constraints:
                    unique: true
                    nullable: false

              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - sql:
            sql: ALTER TABLE storage.categories
              ADD CONSTRAINT chk_categories_type
              CHECK (type IN ('INCOME', 'EXPENSE', 'SAVINGS'));