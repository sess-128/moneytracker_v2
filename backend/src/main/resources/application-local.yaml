logging:
  level:
    org.jetbrains.exposed.sql: DEBUG
    org.jetbrains.exposed.sql.statements: DEBUG
    org.jetbrains.exposed.sql.transactions: DEBUG
    jdbc.sqlonly: DEBUG
spring:
  liquibase:
    change-log: db/changelog/db.changelog-master.yaml
    enabled: true
  docker:
    compose:
      file: docker-compose-local.yml
  datasource:
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
  exposed:
    generate-ddl: false
application:
  mode: local
jwt:
  accessTokenExpiration: ${JWT_TOKEN_EXPIRE_TIME}
  secret: ${JWT_TOKEN_SECRET}
