services:
  postgres-prod:
    image: postgres:16-alpine
    container_name: mt-db-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres-prod:/var/lib/postgresql/data
    networks:
      - mt-network-prod

  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mt-backend-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - postgres-prod
    networks:
      - mt-network-prod

  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mt-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend-prod
    networks:
      - mt-network-prod

networks:
  mt-network-prod:
    driver: bridge

volumes:
  postgres-prod:
