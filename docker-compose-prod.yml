services:
  postgres-prod:
    image: postgres:15-alpine
    container_name: mt-db-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "5433:5432"
    volumes:
      - postgres-prod:/var/lib/postgresql/data
    networks:
      - mt-network-prod

  backend-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt-backend-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "8081:8080"
    depends_on:
      - postgres-prod
    networks:
      - mt-network-prod

networks:
  mt-network-prod:
    driver: bridge

volumes:
  postgres-prod: